<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imperium TV - Teste Grátis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <section id="telaBoasVindas">
    <h1>🎉 Bem-vindo à Imperium TV</h1>
    <p>Antes de gerar seu teste grátis, vamos instalar o aplicativo correto.</p>
    <p>⏱️ Leva menos de 2 minutos.</p>
    <button onclick="mostrarDispositivos()">COMEÇAR</button>
  </section>

  <section id="telaDispositivos" class="hidden">
    <h2>📺 Qual aparelho você vai utilizar?</h2>
    <div class="grid-dispositivos" id="listaDispositivos"></div>
  </section>

  <section id="telaTutorial" class="hidden">
    <button class="btn-voltar" onclick="voltarDispositivos()">← Voltar</button>

    <h2 id="tituloTutorial"></h2>
    <p class="app-info" id="appTutorial"></p>

    <div class="progresso">
      <div id="barraProgresso"></div>
    </div>

    <div class="passo-box">
      <h3 id="tituloPasso"></h3>
      <p id="textoPasso"></p>
    </div>

    <div class="botoes">
      <button class="btn-secundario" onclick="passoAnterior()">← Voltar</button>
      <button class="btn-principal" onclick="proximoPasso()">Próximo →</button>
    </div>

    <button class="btn-alerta" onclick="abrirRegiao()">
      ❌ Não encontrei o aplicativo
    </button>
  </section>

  <section id="telaRegiao" class="hidden">
    <button class="btn-voltar" onclick="voltarTutorial()">← Voltar ao tutorial</button>

    <h2>🌎 Ajuda para encontrar o aplicativo</h2>

    <div class="progresso">
      <div id="barraRegiao"></div>
    </div>

    <div class="passo-box">
      <h3 id="tituloRegiao"></h3>
      <p id="textoRegiao"></p>
    </div>

    <div class="botoes">
      <button class="btn-secundario" onclick="regiaoAnterior()">← Voltar</button>
      <button class="btn-principal" onclick="proximaRegiao()">Próximo →</button>
    </div>
  </section>

  <section id="telaFormulario" class="hidden">
    <button class="btn-voltar" onclick="voltarTutorial()">← Voltar</button>

    <h2>✅ Agora vamos gerar seu teste</h2>
    <p>Preencha seus dados para receber usuário e senha no WhatsApp.</p>

    <form id="formTeste">
      <input type="text" id="nomeCliente" placeholder="Seu nome" required>
      <input type="text" id="whatsapp" placeholder="WhatsApp" required>

      <select id="tipoTeste">
        <option value="sem_adulto">Sem Adulto</option>
        <option value="com_adulto">Com Adulto 🔞</option>
      </select>

      <button type="submit">GERAR TESTE</button>
    </form>

    <div id="resultado"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
